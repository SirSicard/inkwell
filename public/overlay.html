<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', -apple-system, sans-serif;
    }
    .container {
      display: flex;
      align-items: center;
      gap: 0;
      height: 97px;
    }
    canvas {
      width: 97px;
      height: 97px;
      display: block;
      flex-shrink: 0;
    }
    .text-area {
      display: none;
      align-items: center;
      padding: 8px 16px 8px 4px;
      max-width: 353px;
      height: 97px;
      overflow: hidden;
    }
    .text-area.visible {
      display: flex;
    }
    .text-content {
      color: rgba(240, 239, 232, 0.9);
      font-size: 14px;
      line-height: 1.4;
      max-height: 78px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      word-break: break-word;
      /* Glass background pill */
      background: rgba(12, 11, 10, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(240, 239, 232, 0.12);
      border-radius: 16px;
      padding: 12px 16px;
      max-width: 330px;
      /* Fade in */
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .text-content.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <canvas id="c" width="194" height="194"></canvas>
    <div class="text-area" id="textArea">
      <div class="text-content" id="textContent"></div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    canvas.width = 194; canvas.height = 194;
    const ctx = canvas.getContext('2d');
    const W = 194, H = 194, CX = W/2, CY = H/2;
    const textArea = document.getElementById('textArea');
    const textContent = document.getElementById('textContent');

    // Listen for partial transcription events from Rust backend
    let currentText = '';
    if (window.__TAURI__) {
      window.__TAURI__.event.listen('partial-transcription', (event) => {
        const text = event.payload || '';
        if (text !== currentText) {
          currentText = text;
          updateText(text);
        }
      });

      // Also clear when recording stops
      window.__TAURI__.event.listen('recording-state', (event) => {
        if (!event.payload) {
          // Recording stopped, clear text
          currentText = '';
          updateText('');
        }
      });
    }

    function updateText(text) {
      if (text && text.trim()) {
        textContent.textContent = text.trim();
        textArea.classList.add('visible');
        textContent.classList.add('visible');
        // Resize window to fit text
        resizeWindow(true);
      } else {
        textContent.classList.remove('visible');
        setTimeout(() => {
          textArea.classList.remove('visible');
          textContent.textContent = '';
          resizeWindow(false);
        }, 150);
      }
    }

    function resizeWindow(hasText) {
      if (window.__TAURI__) {
        const width = hasText ? 450 : 97;
        window.__TAURI__.window.getCurrentWindow().setSize(
          new window.__TAURI__.window.LogicalSize(width, 97)
        ).catch(() => {});
        // Re-center horizontally
        window.__TAURI__.window.getCurrentWindow().outerPosition().then(pos => {
          if (hasText && pos) {
            // Shift left to keep centered
            const shift = (450 - 97) / 2;
            window.__TAURI__.window.getCurrentWindow().setPosition(
              new window.__TAURI__.window.LogicalPosition(pos.x - shift, pos.y)
            ).catch(() => {});
          }
        }).catch(() => {});
      }
    }

    // --- Ink blob rendering (unchanged) ---
    function noise(x, y) {
      const s = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
      return (s - Math.floor(s)) * 2 - 1;
    }

    function smoothNoise(x, y) {
      const ix = Math.floor(x), iy = Math.floor(y);
      const fx = x - ix, fy = y - iy;
      const sx = fx * fx * (3 - 2 * fx), sy = fy * fy * (3 - 2 * fy);
      const n00 = noise(ix, iy), n10 = noise(ix+1, iy);
      const n01 = noise(ix, iy+1), n11 = noise(ix+1, iy+1);
      return n00*(1-sx)*(1-sy) + n10*sx*(1-sy) + n01*(1-sx)*sy + n11*sx*sy;
    }

    function fbm(x, y) {
      return smoothNoise(x, y) * 0.6 + smoothNoise(x*2, y*2) * 0.3 + smoothNoise(x*4, y*4) * 0.1;
    }

    const barCount = 5;
    let barHeights = new Array(barCount).fill(0);

    function render() {
      const t = Date.now() * 0.001;
      ctx.clearRect(0, 0, W, H);

      const baseRadius = 72;
      const segments = 80;

      ctx.beginPath();
      for (let i = 0; i <= segments; i++) {
        const angle = (i / segments) * Math.PI * 2;
        const nx = Math.cos(angle), ny = Math.sin(angle);
        const n1 = fbm(nx * 0.8 + t * 0.3, ny * 0.8 - t * 0.2);
        const n2 = fbm(nx * 1.8 + t * 0.5 + 7, ny * 1.8 - t * 0.4 + 7);
        const n3 = fbm(nx * 3.5 + t * 0.7 + 15, ny * 3.5 - t * 0.6 + 15);
        const n4 = smoothNoise(angle * 2.5 + t * 0.6, t * 0.15);
        const deform = n1 * 12 + n2 * 6 + n3 * 3 + n4 * 5;
        const r = baseRadius + deform;
        const x = CX + nx * r;
        const y = CY + ny * r;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();

      const baseGrad = ctx.createRadialGradient(CX, CY + 8, 4, CX, CY, baseRadius + 6);
      baseGrad.addColorStop(0, '#141312');
      baseGrad.addColorStop(0.7, '#0c0b0a');
      baseGrad.addColorStop(1, '#060505');
      ctx.fillStyle = baseGrad;
      ctx.fill();

      ctx.save();
      ctx.clip();
      const specGrad = ctx.createRadialGradient(CX - 14, CY - 16, 2, CX - 10, CY - 10, baseRadius * 0.6);
      specGrad.addColorStop(0, 'rgba(240, 239, 232, 0.12)');
      specGrad.addColorStop(0.3, 'rgba(240, 239, 232, 0.04)');
      specGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = specGrad;
      ctx.fill();

      const shadowGrad = ctx.createRadialGradient(CX + 4, CY + 18, 2, CX, CY + 10, baseRadius * 0.8);
      shadowGrad.addColorStop(0, 'rgba(0, 0, 0, 0.3)');
      shadowGrad.addColorStop(0.5, 'rgba(0, 0, 0, 0.1)');
      shadowGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = shadowGrad;
      ctx.fill();

      const edgeGrad = ctx.createRadialGradient(CX + 20, CY - 8, 1, CX + 16, CY - 4, baseRadius * 0.4);
      edgeGrad.addColorStop(0, 'rgba(240, 239, 232, 0.05)');
      edgeGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = edgeGrad;
      ctx.fill();
      ctx.restore();

      ctx.strokeStyle = 'rgba(240, 239, 232, 0.3)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      const barW = 3.5;
      const barGap = 5;
      const totalW = barCount * barW + (barCount - 1) * barGap;
      const startX = CX - totalW / 2;

      for (let i = 0; i < barCount; i++) {
        const phase = i * 0.8;
        const target = 5 + Math.sin(t * 2.5 + phase) * 7 + Math.sin(t * 4.1 + phase * 1.3) * 3.5 + Math.cos(t * 1.7 + phase * 0.5) * 2.5;
        barHeights[i] += (Math.max(3, target) - barHeights[i]) * 0.15;
      }

      for (let i = 0; i < barCount; i++) {
        const x = startX + i * (barW + barGap);
        const h = barHeights[i];
        const y = CY - h / 2;
        ctx.beginPath();
        ctx.roundRect(x, y, barW, h, 2);
        const opacity = i === Math.floor(barCount/2) ? 0.5 : 0.3;
        ctx.fillStyle = `rgba(240, 239, 232, ${opacity})`;
        ctx.fill();
      }

      for (let i = 0; i < 40; i++) {
        const gx = Math.random() * W;
        const gy = Math.random() * H;
        const dx = gx - CX, dy = gy - CY;
        if (dx*dx + dy*dy < (baseRadius+5)*(baseRadius+5)) {
          ctx.fillStyle = `rgba(240, 239, 232, ${Math.random() * 0.025})`;
          ctx.fillRect(gx, gy, 1, 1);
        }
      }

      requestAnimationFrame(render);
    }
    render();
  </script>
</body>
</html>
